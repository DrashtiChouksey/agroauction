version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kisanbid-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/kisanbid
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    networks:
      - kisanbid-network
    restart: unless-stopped
    command: npm run dev

  mongo:
    image: mongo:7.0
    container_name: kisanbid-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - kisanbid-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: kisanbid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kisanbid-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: kisanbid-mongo-ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/kisanbid
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo
    networks:
      - kisanbid-network
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  kisanbid-network:
    driver: bridge
